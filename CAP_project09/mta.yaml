_schema-version: 3.3.0
ID: CAP_project09
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: CAP_project09-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: CAP_project09-auth
      - name: CAP_project09-destination

resources:
  - name: CAP_project09-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: CAP_project09-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
        role-collections:
          - name: 'ExtAdmin (CAP_project09 ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.ExtAdmin'
          - name: 'ExtDeveloper (CAP_project09 ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.ExtDeveloper'
  - name: CAP_project09-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
