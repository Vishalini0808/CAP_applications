<!DOCTYPE html>
<html>

<head>
    <title>Location Finder</title>
</head>

<body style="font-family: Arial; text-align:center; margin-top:50px;">

    <h2> Location Finder</h2>

    <input id="locationInput" placeholder="Enter location" style="padding:8px; width:250px;" />
    <button onclick="getLocation()" style="padding:8px;">Search</button>

    <div id="output" style="margin-top:20px;"></div>

    <script>
        async function getLocation() {

            const loc = document.getElementById("locationInput").value;

            if (!loc) {
                document.getElementById("output").innerHTML = "Enter a location";
                return;
            }

            try {
                const response = await fetch(
                    `/odata/v4/map/getLocation(address='${encodeURIComponent(loc)}')`
                );

                const data = await response.json();

                if (!data.latitude) {
                    document.getElementById("output").innerHTML = "Location not found";
                    return;
                }

                document.getElementById("output").innerHTML = `
                    <div style="border:1px solid #ccc; padding:15px; display:inline-block;">
                        <p><b>Latitude:</b> ${data.latitude}</p>
                        <p><b>Longitude:</b> ${data.longitude}</p>
                        <p><b>City:</b> ${data.city || '-'}</p>
                        <p><b>State:</b> ${data.state || '-'}</p>
                        <p><b>Country:</b> ${data.country || '-'}</p>
                    </div>

                    <br><br>

                    <iframe 
                        width="500" 
                        height="300" 
                        src="https://www.openstreetmap.org/export/embed.html?marker=${data.latitude},${data.longitude}">
                    </iframe>
                `;

            } catch (err) {
                console.error(err);
                document.getElementById("output").innerHTML = " Error fetching location";
            }
        }
    </script>

</body>

</html>
